name: Update Cask

on:
  repository_dispatch:
    types: [update-cask]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update netvow cask
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          ARM_SHA="${{ github.event.client_payload.arm_sha }}"

          sed -i "s/version \".*\"/version \"$VERSION\"/" Casks/netvow.rb
          sed -i "s/sha256 \".*\"/sha256 \"$ARM_SHA\"/" Casks/netvow.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/netvow.rb
          git diff --staged --quiet || git commit -m "Update netvow to v${{ github.event.client_payload.version }}"
          git push
